<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Project Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}

/* ── Tokens ─────────────────────────────────────────────── */
:root{
  /* Brand */
  --primary:#024ad8;
  --primary-bright:#296ef9;
  --primary-deep:#0e3191;
  /* Surface */
  --canvas:#ffffff;
  --cloud:#f7f7f7;
  --fog:#e8e8e8;
  --steel:#c2c2c2;
  /* Text */
  --ink:#1a1a1a;
  --on-ink:#ffffff;
  --charcoal:#3d3d3d;
  --graphite:#636363;
  /* Category accents */
  --cat-ai:#7c3aed;
  --cat-data:#0369a1;
  --cat-doc:#15803d;
  --cat-mcp:#b45309;
  --cat-util:#525252;
  /* Shadows */
  --shadow-soft:0 2px 8px rgba(26,26,26,.08);
  --shadow-float:0 8px 24px rgba(26,26,26,.12);
  /* Radius */
  --r-md:4px;
  --r-lg:8px;
  --r-xl:16px;
  --r-pill:9999px;
}

/* ── Base ────────────────────────────────────────────────── */
body{
  font-family:'Manrope',Arial,sans-serif;
  font-size:16px;font-weight:400;line-height:1.38;
  background:var(--canvas);color:var(--ink);
}
.container{max-width:1080px;margin:0 auto;padding:0 32px}

/* ── Utility Strip ───────────────────────────────────────── */
.utility-strip{
  background:var(--ink);color:var(--on-ink);
  height:36px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;font-size:13px;font-weight:400;
}
.utility-strip a{color:var(--steel);text-decoration:none}

/* ── Hero Section ────────────────────────────────────────── */
.hero-section{
  background:var(--canvas);
  padding:64px 0 72px;
  position:relative;overflow:hidden;
}
/* Chevron decorations — HP wordmark slash motif */
.hero-section::before,
.hero-section::after{
  content:'';position:absolute;top:0;bottom:0;
  width:110px;background:var(--primary);
}
.hero-section::before{
  left:-24px;
  clip-path:polygon(22% 0%,100% 0%,78% 100%,0% 100%);
}
.hero-section::after{
  right:-24px;
  clip-path:polygon(22% 0%,100% 0%,78% 100%,0% 100%);
}
.hero-inner{position:relative;z-index:1;text-align:center}
.hero-eyebrow{
  display:inline-block;
  font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--primary);margin-bottom:20px;
}
.hero-inner h1{
  font-size:56px;font-weight:500;line-height:1.0;
  color:var(--ink);margin-bottom:16px;
}
.hero-inner h1 em{font-style:normal;color:var(--primary)}
.hero-sub{
  font-size:18px;font-weight:400;line-height:1.33;
  color:var(--charcoal);
}

/* ── Stats Band (cloud) ──────────────────────────────────── */
.stats-band{
  background:var(--cloud);padding:48px 0;
}
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
}
.stat-card{
  background:var(--canvas);border-radius:var(--r-xl);
  padding:28px 24px;text-align:center;
  box-shadow:var(--shadow-soft);
}
.stat-number{
  display:block;font-size:44px;font-weight:500;line-height:1.0;
  color:var(--primary);margin-bottom:8px;
}
.stat-label{
  font-size:14px;font-weight:400;color:var(--charcoal);
}

/* ── Timeline Section (white) ────────────────────────────── */
.timeline-section{background:var(--canvas);padding:64px 0 80px}

/* Filter tabs — pill sub-nav */
.filter-row{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-bottom:48px;
}
.filter-tab{
  background:var(--canvas);
  border:1px solid var(--fog);
  border-radius:var(--r-pill);
  padding:8px 20px;
  font-family:'Manrope',Arial,sans-serif;
  font-size:14px;font-weight:500;color:var(--ink);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.filter-tab:hover{border-color:var(--steel)}
.filter-tab.active{
  background:var(--ink);color:var(--on-ink);border-color:var(--ink);
}
.cat-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:7px;vertical-align:middle;
}

/* Timeline structure */
.timeline{position:relative;padding-left:36px}
.timeline::before{
  content:'';position:absolute;left:12px;top:4px;bottom:0;
  width:1px;background:var(--fog);
}

.date-group{margin-bottom:32px}
.date-label{
  position:relative;
  font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--graphite);margin-bottom:14px;
}
.date-label::before{
  content:'';position:absolute;left:-28px;top:3px;
  width:10px;height:10px;border-radius:50%;
  background:var(--primary);border:2px solid var(--canvas);
  box-shadow:0 0 0 2px var(--primary);
}

/* Project card */
.card{
  background:var(--canvas);
  border:1px solid var(--fog);
  border-radius:var(--r-xl);
  padding:20px 24px;
  margin-bottom:12px;
  box-shadow:var(--shadow-soft);
  transition:box-shadow .2s,transform .2s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;border-radius:var(--r-xl) 0 0 var(--r-xl);
}
.card[data-cat="ai"]::before   {background:var(--cat-ai)}
.card[data-cat="data"]::before {background:var(--cat-data)}
.card[data-cat="doc"]::before  {background:var(--cat-doc)}
.card[data-cat="mcp"]::before  {background:var(--cat-mcp)}
.card[data-cat="util"]::before {background:var(--cat-util)}

.card:hover{box-shadow:var(--shadow-float);transform:translateY(-2px)}
.card.has-url{cursor:pointer}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:6px;
}
.card-title{font-size:20px;font-weight:500;line-height:1.0;color:var(--ink)}
.card.has-url:hover .card-title{color:var(--primary)}

/* Status badges */
.badge{
  flex-shrink:0;
  font-size:12px;font-weight:700;letter-spacing:.3px;
  padding:4px 12px;border-radius:var(--r-lg);
  border:1px solid;white-space:nowrap;
}
.badge.done{
  background:rgba(21,128,61,.08);color:#15803d;border-color:rgba(21,128,61,.25);
}
.badge.wip{
  background:rgba(180,83,9,.08);color:#b45309;border-color:rgba(180,83,9,.25);
}

.card-desc{font-size:14px;font-weight:400;color:var(--charcoal);margin-bottom:12px;line-height:1.5}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag{
  font-size:12px;font-weight:500;
  padding:3px 10px;border-radius:var(--r-lg);
  background:var(--cloud);color:var(--charcoal);
  border:1px solid var(--fog);
}

/* Open button — button-primary style */
.open-btn{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;
  font-family:'Manrope',Arial,sans-serif;
  font-size:14px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  color:var(--on-ink);background:var(--primary);
  border:none;border-radius:var(--r-md);
  padding:10px 20px;height:40px;
  text-decoration:none;cursor:pointer;
  transition:background .18s;
}
.open-btn:hover{background:var(--primary-deep)}
.open-btn .url-hint{
  font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;
  opacity:.7;
}

/* ── Ink Footer Slab ─────────────────────────────────────── */
.footer-slab{
  background:var(--ink);color:var(--on-ink);
  padding:64px 32px;text-align:center;
}
.footer-slab h2{
  font-size:32px;font-weight:500;line-height:1.0;
  margin-bottom:12px;
}
.footer-slab p{
  font-size:14px;font-weight:400;color:var(--steel);
  margin-bottom:32px;
}
.footer-meta{
  font-size:12px;color:var(--graphite);
  border-top:1px solid #2e2e2e;padding-top:24px;margin-top:12px;
}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:1023px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:767px){
  .hero-inner h1{font-size:36px}
  .hero-section::before,.hero-section::after{width:70px}
  .container{padding:0 20px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .card-header{flex-direction:column;align-items:flex-start;gap:8px}
  .footer-slab h2{font-size:24px}
}
@media(max-width:479px){
  .hero-section::before,.hero-section::after{display:none}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stat-number{font-size:32px}
}
</style>
</head>
<body>

<!-- Utility Strip -->
<div class="utility-strip">
  <span>Claude Code Dashboard</span>
  <span>2026.04.24 — 2026.05.12</span>
</div>

<!-- Hero -->
<section class="hero-section">
  <div class="hero-inner container">
    <span class="hero-eyebrow">Project Timeline</span>
    <h1>Claude Code와 함께한<br><em>작업 기록</em></h1>
    <p class="hero-sub">3주간 18개 프로젝트 · 5개 분야 · 13개 세션</p>
  </div>
</section>

<!-- Stats Band -->
<section class="stats-band">
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-number">18</span>
        <span class="stat-label">총 프로젝트</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">19</span>
        <span class="stat-label">활동 일수</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">5</span>
        <span class="stat-label">분야</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">13</span>
        <span class="stat-label">세션 기록</span>
      </div>
    </div>
  </div>
</section>

<!-- Timeline -->
<section class="timeline-section">
  <div class="container">

    <div class="filter-row">
      <button class="filter-tab active" data-filter="all">전체</button>
      <button class="filter-tab" data-filter="ai">
        <span class="cat-dot" style="background:var(--cat-ai)"></span>AI / LLM
      </button>
      <button class="filter-tab" data-filter="data">
        <span class="cat-dot" style="background:var(--cat-data)"></span>데이터 수집 / 분석
      </button>
      <button class="filter-tab" data-filter="doc">
        <span class="cat-dot" style="background:var(--cat-doc)"></span>문서 / 프레젠테이션
      </button>
      <button class="filter-tab" data-filter="mcp">
        <span class="cat-dot" style="background:var(--cat-mcp)"></span>MCP 서버
      </button>
      <button class="filter-tab" data-filter="util">
        <span class="cat-dot" style="background:var(--cat-util)"></span>교육 / 유틸
      </button>
    </div>

    <div class="timeline" id="timeline"></div>

  </div>
</section>

<!-- Footer Ink Slab -->
<footer class="footer-slab">
  <h2>Built with Claude Code</h2>
  <p>Anthropic Claude Opus 4.6 · Visual Design inspired by HP Design System</p>
  <div class="footer-meta">© 2026 · D:\01 WORK\260512 dashboard</div>
</footer>

<script>
const projects = [
  {date:"2026-04-24",name:"RHWP Studio",desc:"HWP 문서 작업용 AI 스튜디오 — GUI 설치, GitHub 연동 및 LLM 응답 에러 수정",cat:"doc",status:"done",tags:["Python","HWP","AI Studio"],url:"http://127.0.0.1:8000"},
  {date:"2026-04-26",name:"I am not AI",desc:"im-not-ai 리포지토리 초기 설정 및 구성",cat:"util",status:"done",tags:["GitHub"]},
  {date:"2026-04-26",name:"Slide-maker",desc:"AI 기반 슬라이드 자동 제작 도구",cat:"doc",status:"done",tags:["JavaScript","HTML"]},
  {date:"2026-04-29",name:"Korean Law MCP",desc:"한국 법률 정보 조회를 위한 MCP 서버 설정",cat:"mcp",status:"done",tags:["MCP","Python","법률 API"]},
  {date:"2026-04-29",name:"수학경시대회",desc:"초등 4학년 수학경시대회 모의고사 웹페이지 — PDF 기반 문제 / 해설",cat:"util",status:"done",tags:["HTML","JavaScript","PDF"]},
  {date:"2026-04-30",name:"ChatGPT PPT",desc:"ChatGPT를 활용한 PPT 자동 생성 도구",cat:"doc",status:"done",tags:["ChatGPT","PowerPoint"]},
  {date:"2026-04-30",name:"KISTI MCP",desc:"KISTI 과학기술 정보 MCP 서버 구축",cat:"mcp",status:"done",tags:["MCP","Python","KISTI"]},
  {date:"2026-04-30",name:"Matt Pocock Skills",desc:"Claude Code 스킬 구조 분석 및 활용 방법 학습",cat:"util",status:"done",tags:["Claude Code","Skills"]},
  {date:"2026-04-30",name:"Slide-maker v2",desc:"슬라이드 제작 도구 개선 — 디자인 및 기능 업그레이드",cat:"doc",status:"done",tags:["JavaScript","HTML"]},
  {date:"2026-05-03",name:"KISTI MCP v2",desc:"KISTI MCP 서버 개선 버전 — 기능 확장",cat:"mcp",status:"done",tags:["MCP","Python","KISTI"]},
  {date:"2026-05-07",name:"ScienceON / NTIS",desc:"과학기술 논문 및 국가R&D 과제 검색 · 트렌드 분석 도구",cat:"data",status:"done",tags:["Web Scraping","JavaScript","API"]},
  {date:"2026-05-07",name:"교육이수현황",desc:"교육 이수 현황 관리 및 조회 도구",cat:"util",status:"done",tags:["HTML","데이터 관리"]},
  {date:"2026-05-09",name:"네이버 주식 크롤러",desc:"네이버 금융 크롤링 — 증권사별 매매 동향 분석",cat:"data",status:"done",tags:["Python","Web Scraping","금융"]},
  {date:"2026-05-09",name:"NVIDIA Nemotron",desc:"Nemotron Personas Korea 데이터셋 기반 가상 설문 시스템",cat:"ai",status:"wip",tags:["NVIDIA","LLM","HuggingFace","Ollama"]},
  {date:"2026-05-11",name:"MiroFish",desc:"온톨로지 그래프 자동 생성 백엔드 서비스 — 네트워크 에러 수정",cat:"ai",status:"wip",tags:["Python","FastAPI","그래프 DB"],url:"http://172.30.24.141:3000"},
  {date:"2026-05-11",name:"Ollama Gemma API",desc:"Ollama + Gemma4:26b 로컬 LLM API 설정 및 테스트",cat:"ai",status:"done",tags:["Ollama","Gemma","Python"],url:"http://localhost:11434"},
  {date:"2026-05-12",name:"HP Style PPT",desc:"HP 디자인 시스템 기반 프레젠테이션 제작",cat:"doc",status:"wip",tags:["PowerPoint","디자인"]},
  {date:"2026-05-12",name:"Dashboard",desc:"작업 결과 정리 타임라인 대시보드 — 현재 프로젝트",cat:"util",status:"wip",tags:["HTML","CSS","JavaScript"]},
];

function render(filter){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';
  const grouped={};
  projects.forEach(p=>{
    if(filter!=='all'&&p.cat!==filter) return;
    if(!grouped[p.date]) grouped[p.date]=[];
    grouped[p.date].push(p);
  });
  const dates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));
  if(dates.length===0){
    tl.innerHTML='<p style="color:var(--graphite);padding:32px 0">해당 카테고리의 프로젝트가 없습니다.</p>';
    return;
  }
  dates.forEach(d=>{
    const g=document.createElement('div');
    g.className='date-group';
    const dt=new Date(d+'T00:00:00');
    const label=`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
    g.innerHTML=`<div class="date-label">${label}</div>`;
    grouped[d].forEach(p=>{
      const c=document.createElement('div');
      c.className='card'+(p.url?' has-url':'');
      c.dataset.cat=p.cat;
      const urlBtn=p.url
        ?`<a class="open-btn" href="${p.url}" target="_blank" rel="noopener"
            onclick="event.stopPropagation()">
            ↗ 결과 열기
            <span class="url-hint">${p.url}</span>
          </a>`
        :'';
      c.innerHTML=`
        <div class="card-header">
          <span class="card-title">${p.name}</span>
          <span class="badge ${p.status}">${p.status==='done'?'완료':'진행중'}</span>
        </div>
        <div class="card-desc">${p.desc}</div>
        <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${urlBtn}
      `;
      if(p.url) c.addEventListener('click',e=>{
        if(e.target.closest('.open-btn')) return;
        window.open(p.url,'_blank','noopener');
      });
      g.appendChild(c);
    });
    tl.appendChild(g);
  });
}

document.querySelectorAll('.filter-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render('all');
</script>
</body>
</html>
