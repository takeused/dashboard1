<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Project Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
/* ── Reset ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}

/* ── Tokens ─────────────────────────────────────────────── */
:root{
  /* Brand */
  --primary:#024ad8;
  --primary-bright:#296ef9;
  --primary-deep:#0e3191;
  /* Home accent */
  --home-accent:#ea580c;
  --home-accent-deep:#c2410c;
  /* Surface */
  --canvas:#ffffff;
  --cloud:#f7f7f7;
  --fog:#e8e8e8;
  --steel:#c2c2c2;
  /* Text */
  --ink:#1a1a1a;
  --on-ink:#ffffff;
  --charcoal:#3d3d3d;
  --graphite:#636363;
  /* Category accents */
  --cat-ai:#7c3aed;
  --cat-data:#0369a1;
  --cat-doc:#15803d;
  --cat-mcp:#b45309;
  --cat-util:#525252;
  --cat-finance:#0d9488;
  /* Shadows */
  --shadow-soft:0 2px 8px rgba(26,26,26,.08);
  --shadow-float:0 8px 24px rgba(26,26,26,.12);
  /* Radius */
  --r-md:4px;
  --r-lg:8px;
  --r-xl:16px;
  --r-pill:9999px;
}

/* ── Base ────────────────────────────────────────────────── */
body{
  font-family:'Manrope','Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',Arial,sans-serif;
  font-size:16px;font-weight:400;line-height:1.38;
  background:var(--canvas);color:var(--ink);
}
.container{max-width:1080px;margin:0 auto;padding:0 32px}

/* ── Utility Strip ───────────────────────────────────────── */
.utility-strip{
  background:var(--ink);color:var(--on-ink);
  height:36px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;font-size:13px;font-weight:400;
}
.utility-strip a{color:var(--steel);text-decoration:none}

/* ── Hero Section ────────────────────────────────────────── */
.hero-section{
  background:var(--canvas);
  padding:64px 0 72px;
  position:relative;overflow:hidden;
}
.hero-section::before,
.hero-section::after{
  content:'';position:absolute;top:0;bottom:0;
  width:110px;background:var(--primary);
}
.hero-section::before{
  left:-24px;
  clip-path:polygon(22% 0%,100% 0%,78% 100%,0% 100%);
}
.hero-section::after{
  right:-24px;
  clip-path:polygon(22% 0%,100% 0%,78% 100%,0% 100%);
}
.hero-inner{position:relative;z-index:1;text-align:center}
.hero-eyebrow{
  display:inline-block;
  font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--primary);margin-bottom:20px;
}
.hero-inner h1{
  font-size:56px;font-weight:500;line-height:1.0;
  color:var(--ink);margin-bottom:16px;
}
.hero-inner h1 em{font-style:normal;color:var(--primary)}
.hero-sub{
  font-size:18px;font-weight:400;line-height:1.33;
  color:var(--charcoal);
}

/* ── Stats Band (cloud) ──────────────────────────────────── */
.stats-band{
  background:var(--cloud);padding:48px 0;
}
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
}
.stat-card{
  background:var(--canvas);border-radius:var(--r-xl);
  padding:28px 24px;text-align:center;
  box-shadow:var(--shadow-soft);
}
.stat-number{
  display:block;font-size:44px;font-weight:500;line-height:1.0;
  color:var(--primary);margin-bottom:8px;
}
.stat-number.home-color{color:var(--home-accent)}
.stat-label{
  font-size:14px;font-weight:400;color:var(--charcoal);
}

/* ── Timeline Section (white) ────────────────────────────── */
.timeline-section{background:var(--canvas);padding:64px 0 80px}

/* Group selector */
.group-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;
}
.group-row-label{
  font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--graphite);margin-right:4px;white-space:nowrap;
}
.group-tab{
  background:var(--canvas);
  border:1px solid var(--fog);
  border-radius:var(--r-pill);
  padding:8px 20px;
  font-family:inherit;
  font-size:14px;font-weight:600;color:var(--ink);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.group-tab:hover{border-color:var(--steel)}
.group-tab.active[data-group="all"]{background:var(--ink);color:var(--on-ink);border-color:var(--ink)}
.group-tab.active[data-group="work"]{background:var(--primary);color:var(--on-ink);border-color:var(--primary)}
.group-tab.active[data-group="home"]{background:var(--home-accent);color:var(--on-ink);border-color:var(--home-accent)}

/* Filter tabs — pill sub-nav */
.filter-row{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-bottom:48px;
}
.filter-tab{
  background:var(--canvas);
  border:1px solid var(--fog);
  border-radius:var(--r-pill);
  padding:8px 20px;
  font-family:inherit;
  font-size:14px;font-weight:500;color:var(--ink);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.filter-tab:hover{border-color:var(--steel)}
.filter-tab.active{
  background:var(--ink);color:var(--on-ink);border-color:var(--ink);
}
.cat-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:7px;vertical-align:middle;
}

/* Group indicator on cards */
.group-indicator{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:600;letter-spacing:.3px;
  padding:2px 9px;border-radius:var(--r-pill);
  flex-shrink:0;
}
.group-indicator.work{background:rgba(2,74,216,.09);color:var(--primary)}
.group-indicator.home{background:rgba(234,88,12,.09);color:var(--home-accent)}

/* Timeline structure */
.timeline{position:relative;padding-left:36px}
.timeline::before{
  content:'';position:absolute;left:12px;top:4px;bottom:0;
  width:1px;background:var(--fog);
}

.date-group{margin-bottom:32px}
.date-label{
  position:relative;
  font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--graphite);margin-bottom:14px;
}
.date-label::before{
  content:'';position:absolute;left:-28px;top:3px;
  width:10px;height:10px;border-radius:50%;
  background:var(--primary);border:2px solid var(--canvas);
  box-shadow:0 0 0 2px var(--primary);
}

/* Project card */
.card{
  background:var(--canvas);
  border:1px solid var(--fog);
  border-radius:var(--r-xl);
  padding:20px 24px;
  margin-bottom:12px;
  box-shadow:var(--shadow-soft);
  transition:box-shadow .2s,transform .2s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;border-radius:var(--r-xl) 0 0 var(--r-xl);
}
.card[data-cat="ai"]::before      {background:var(--cat-ai)}
.card[data-cat="data"]::before    {background:var(--cat-data)}
.card[data-cat="doc"]::before     {background:var(--cat-doc)}
.card[data-cat="mcp"]::before     {background:var(--cat-mcp)}
.card[data-cat="util"]::before    {background:var(--cat-util)}
.card[data-cat="finance"]::before {background:var(--cat-finance)}

.card:hover{box-shadow:var(--shadow-float);transform:translateY(-2px)}
.card.has-url{cursor:pointer}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:6px;
}
.card-title{font-size:20px;font-weight:500;line-height:1.0;color:var(--ink)}
.card.has-url:hover .card-title{color:var(--primary)}
.card-badges{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* Status badges */
.badge{
  flex-shrink:0;
  font-size:12px;font-weight:700;letter-spacing:.3px;
  padding:4px 12px;border-radius:var(--r-lg);
  border:1px solid;white-space:nowrap;
}
.badge.done{
  background:rgba(21,128,61,.08);color:#15803d;border-color:rgba(21,128,61,.25);
}
.badge.wip{
  background:rgba(180,83,9,.08);color:#b45309;border-color:rgba(180,83,9,.25);
}

.card-desc{font-size:14px;font-weight:400;color:var(--charcoal);margin-bottom:12px;line-height:1.5}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag{
  font-size:12px;font-weight:500;
  padding:3px 10px;border-radius:var(--r-lg);
  background:var(--cloud);color:var(--charcoal);
  border:1px solid var(--fog);
}

/* Open button */
.open-btn{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;
  font-family:inherit;
  font-size:14px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  color:var(--on-ink);background:var(--primary);
  border:none;border-radius:var(--r-md);
  padding:10px 20px;height:40px;
  text-decoration:none;cursor:pointer;
  transition:background .18s;
}
.open-btn:hover{background:var(--primary-deep)}
.open-btn .url-hint{
  font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;
  opacity:.7;
}

/* ── Ink Footer Slab ─────────────────────────────────────── */
.footer-slab{
  background:var(--ink);color:var(--on-ink);
  padding:64px 32px;text-align:center;
}
.footer-slab h2{
  font-size:32px;font-weight:500;line-height:1.0;
  margin-bottom:12px;
}
.footer-slab p{
  font-size:14px;font-weight:400;color:var(--steel);
  margin-bottom:32px;
}
.footer-meta{
  font-size:12px;color:var(--graphite);
  border-top:1px solid #2e2e2e;padding-top:24px;margin-top:12px;
}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:1023px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:767px){
  .hero-inner h1{font-size:36px}
  .hero-section::before,.hero-section::after{width:70px}
  .container{padding:0 20px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .card-header{flex-direction:column;align-items:flex-start;gap:8px}
  .footer-slab h2{font-size:24px}
}
@media(max-width:479px){
  .hero-section::before,.hero-section::after{display:none}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stat-number{font-size:32px}
}
</style>
</head>

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let currentGroup = 'all';
let currentFilter = 'all';

function getDashboardStats(items){
  const dates = items.map(p => new Date(p.date + 'T00:00:00'));
  const firstDate = new Date(Math.min(...dates));
  const lastDate = new Date(Math.max(...dates));
  const activeDays = Math.round((lastDate - firstDate) / 86400000) + 1;
  const fmt = d => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  return {
    total: items.length,
    work: items.filter(p => p.group === 'work').length,
    home: items.filter(p => p.group === 'home').length,
    days: activeDays,
    firstLabel: fmt(firstDate),
    lastLabel: fmt(lastDate),
  };
}

function renderSummary(){
  const stats = getDashboardStats(projects);
  document.getElementById('heroSummary').textContent =
    `회사 ${stats.work}개 · 집 ${stats.home}개 · 총 ${stats.total}개 프로젝트`;
  document.querySelector('[data-stat="total"]').textContent = stats.total;
  document.querySelector('[data-stat="work"]').textContent = stats.work;
  document.querySelector('[data-stat="home"]').textContent = stats.home;
  document.querySelector('[data-stat="days"]').textContent = stats.days;
  document.getElementById('dateRange').textContent = `${stats.firstLabel} — ${stats.lastLabel}`;
}

function render(groupFilter, catFilter){
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  const grouped = {};
  projects.forEach(p => {
    if(groupFilter !== 'all' && p.group !== groupFilter) return;
    if(catFilter !== 'all' && p.cat !== catFilter) return;
    if(!grouped[p.date]) grouped[p.date] = [];
    grouped[p.date].push(p);
  });
  const dates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));
  if(dates.length === 0){
    tl.innerHTML = '<p style="color:var(--graphite);padding:32px 0">해당 조건의 프로젝트가 없습니다.</p>';
    return;
  }
  dates.forEach(d => {
    const g = document.createElement('div');
    g.className = 'date-group';
    const dt = new Date(d + 'T00:00:00');
    const label = `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
    g.innerHTML = `<div class="date-label">${label}</div>`;
    grouped[d].forEach(p => {
      const c = document.createElement('div');
      c.className = 'card' + (p.url ? ' has-url' : '');
      c.dataset.cat = p.cat;
      const urlBtn = p.url
        ? `<a class="open-btn" href="${esc(p.url)}" target="_blank" rel="noopener"
            onclick="event.stopPropagation()">
            ↗ 결과 열기
            <span class="url-hint">${esc(p.url)}</span>
          </a>`
        : '';
      const groupLabel = p.group === 'work' ? '회사' : '집';
      c.innerHTML = `
        <div class="card-header">
          <span class="card-title">${esc(p.name)}</span>
          <div class="card-badges">
            <span class="group-indicator ${esc(p.group)}">${groupLabel}</span>
            <span class="badge ${esc(p.status)}">${p.status === 'done' ? '완료' : '진행중'}</span>
          </div>
        </div>
        <div class="card-desc">${esc(p.desc)}</div>
        <div class="tags">${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
        ${urlBtn}
      `;
      if(p.url) c.addEventListener('click', e => {
        if(e.target.closest('.open-btn')) return;
        window.open(p.url, '_blank', 'noopener');
      });
      g.appendChild(c);
    });
    tl.appendChild(g);
  });
}

document.querySelectorAll('.group-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.group-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentGroup = btn.dataset.group;
    render(currentGroup, currentFilter);
  });
});

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render(currentGroup, currentFilter);
  });
});

renderSummary();
render('all', 'all');
